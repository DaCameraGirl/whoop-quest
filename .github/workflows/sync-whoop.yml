name: Sync WHOOP

on:
  schedule:
    # 9am ET = 13:00 UTC
    - cron: '0 13 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Pull WHOOP data
        env:
          WHOOP_ACCESS_TOKEN: ${{ secrets.WHOOP_ACCESS_TOKEN }}
          WHOOP_REFRESH_TOKEN: ${{ secrets.WHOOP_REFRESH_TOKEN }}
          WHOOP_CLIENT_ID: ${{ secrets.WHOOP_CLIENT_ID }}
          WHOOP_CLIENT_SECRET: ${{ secrets.WHOOP_CLIENT_SECRET }}
          EMAIL_TO: angelanelson777@yahoo.com,angela.hudson.data@gmail.com
          EMAIL_FROM: angela.hudson.data@gmail.com
          GMAIL_CLIENT_ID: ${{ secrets.GMAIL_CLIENT_ID }}
          GMAIL_CLIENT_SECRET: ${{ secrets.GMAIL_CLIENT_SECRET }}
          GMAIL_REFRESH_TOKEN: ${{ secrets.GMAIL_REFRESH_TOKEN }}
        run: python scripts/sync_whoop.py

      - name: Commit updated data
        run: |
          git config user.name "whoop-quest-bot"
          git config user.email "bot@users.noreply.github.com"
          git add data/whoop.json
          git diff --staged --quiet || git commit -m "chore: sync WHOOP data $(date -u +%Y-%m-%d)"
          git push
