<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>WHOOP Quest — Daily Board 💖</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700;800&family=Fragment+Mono&display=swap');
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Space Grotesk',system-ui,sans-serif;background:#0d0a1a;color:#fff;min-height:100vh}
  a{color:inherit;text-decoration:none}

  /* --- top nav --- */
  .topbar{display:flex;align-items:center;gap:14px;padding:12px 18px;background:rgba(20,10,35,.7);border-bottom:1px solid rgba(255,79,154,.2);backdrop-filter:blur(12px);position:sticky;top:0;z-index:50}
  .topbar .back{color:#a99ac8;font-size:.82rem;font-weight:600}
  .topbar .back:hover{color:#fff}
  .topbar .title{font-weight:800;font-size:1.05rem}
  .topbar .title span{color:#ff4f9a}
  .topbar .right{margin-left:auto;display:flex;align-items:center;gap:12px;font-size:.78rem;color:#a99ac8}
  .pill{background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.12);border-radius:99px;padding:4px 12px;font-weight:700;white-space:nowrap}

  .wrap{max-width:780px;margin:0 auto;padding:20px 16px 80px}

  /* --- hero / today banner --- */
  .today-hero{background:linear-gradient(145deg,#1a1238,#241845);border:2px solid rgba(255,79,154,.28);border-radius:20px;padding:22px 22px 20px;margin-bottom:20px;position:relative;overflow:hidden}
  .today-hero::before{content:'';position:absolute;right:-30px;top:-30px;width:160px;height:160px;background:radial-gradient(circle,rgba(255,79,154,.13),transparent 70%);border-radius:50%;pointer-events:none}
  .today-hero .date-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
  .today-hero .date-label{font-size:.78rem;color:#a99ac8;font-weight:600;text-transform:uppercase;letter-spacing:.04em}
  .today-hero .recovery-badge{font-size:1.15rem;font-weight:800;padding:4px 14px;border-radius:99px}
  .rb-green{background:rgba(52,211,153,.15);color:#34d399;border:1px solid rgba(52,211,153,.3)}
  .rb-yellow{background:rgba(251,191,36,.13);color:#fbbf24;border:1px solid rgba(251,191,36,.25)}
  .rb-red{background:rgba(255,90,122,.13);color:#ff5a7a;border:1px solid rgba(255,90,122,.25)}
  .stats-line{display:flex;flex-wrap:wrap;gap:14px;font-size:.82rem;color:#c9b8e8}
  .stats-line b{color:#fff;font-variant-numeric:tabular-nums}
  .mood-line{margin-top:12px;font-size:.9rem;color:#e8d8ff}
  .mood-line b{color:#ff8ac4}

  /* --- quest cards --- */
  .section-label{font-size:.72rem;text-transform:uppercase;letter-spacing:.08em;color:#8a7aa8;font-weight:700;margin:26px 0 10px;display:flex;align-items:center;gap:8px}
  .section-label::after{content:'';flex:1;height:1px;background:rgba(255,255,255,.08)}
  
  .quest-list{display:flex;flex-direction:column;gap:12px}
  .quest{
    background:linear-gradient(160deg,rgba(36,24,69,.9),rgba(26,18,56,.9));
    border:1.5px solid rgba(255,255,255,.10);
    border-radius:16px;
    padding:16px 16px 14px;
    display:flex;gap:14px;align-items:flex-start;
    position:relative;
    transition:transform .12s,border-color .15s,box-shadow .15s;
    cursor:pointer;
  }
  .quest:hover{transform:translateY(-1px);border-color:rgba(255,79,154,.35)}
  .quest.done{opacity:.55}
  .quest.done .q-title{text-decoration:line-through;color:#8a7aa8}
  .quest.done .q-check{background:#34d399;border-color:#34d399;color:#001a0f}
  .quest:active{transform:scale(.99)}

  .q-check{width:28px;height:28px;min-width:28px;border-radius:9px;border:2px solid rgba(255,255,255,.22);background:rgba(255,255,255,.04);display:flex;align-items:center;justify-content:center;font-size:.82rem;font-weight:800;color:transparent;transition:all .15s;cursor:pointer;margin-top:2px}
  .q-check:hover{border-color:#ff4f9a}
  
  .q-body{flex:1;min-width:0}
  .q-title{font-weight:700;font-size:.95rem;margin-bottom:3px}
  .q-desc{font-size:.8rem;color:#a99ac8;line-height:1.45}
  .q-meta{display:flex;flex-wrap:wrap;gap:8px;margin-top:8px;font-size:.72rem}
  .q-tag{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.09);border-radius:99px;padding:2px 9px;color:#b8a8d8;font-weight:600}
  .q-tag.xp{background:rgba(255,79,154,.12);border-color:rgba(255,79,154,.28);color:#ff8ac4}
  .q-tag.green{color:#34d399}
  .q-tag.yellow{color:#fbbf24}
  .q-tag.red{color:#ff5a7a}
  .q-tag.blue{color:#60a5fa}

  .q-icon{font-size:1.55rem;line-height:1;min-width:34px;text-align:center;opacity:.95}

  /* --- achievement grid --- */
  .ach-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(145px,1fr));gap:10px}
  .ach{
    background:rgba(255,255,255,.04);
    border:1.5px solid rgba(255,255,255,.09);
    border-radius:14px;
    padding:13px 12px;
    text-align:center;
    transition:all .15s;
    position:relative;
  }
  .ach.unlocked{border-color:rgba(255,79,154,.35);background:rgba(255,79,154,.06);box-shadow:0 0 18px rgba(255,79,154,.07)}
  .ach.locked{opacity:.42;filter:grayscale(.7)}
  .ach-emoji{font-size:1.7rem;margin-bottom:4px;display:block}
  .ach-name{font-weight:700;font-size:.78rem;margin-bottom:2px}
  .ach-desc{font-size:.68rem;color:#9a8ab8;line-height:1.35}
  .ach-prog{font-size:.66rem;color:#7a6a98;margin-top:5px}
  .ach-prog b{color:#c9b8e8}
  .ach .lock-badge{position:absolute;top:7px;right:8px;font-size:.65rem}

  /* --- streak bar --- */
  .streak-row{display:flex;gap:8px;flex-wrap:wrap;margin-top:6px}
  .streak-chip{background:rgba(255,79,154,.1);border:1px solid rgba(255,79,154,.22);color:#ff8ac4;border-radius:99px;padding:4px 12px;font-size:.76rem;font-weight:700}

  /* --- level / xp --- */
  .xp-strip{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:14px;padding:14px 16px;margin-top:18px;display:flex;align-items:center;gap:14px}
  .xp-strip .lvl-big{font-size:1.45rem;font-weight:800;color:#ff8ac4}
  .xp-strip .xp-bar-out{flex:1;height:10px;background:rgba(255,255,255,.1);border-radius:99px;overflow:hidden}
  .xp-strip .xp-bar-in{height:100%;background:linear-gradient(90deg,#ff4f9a,#ffb86b);border-radius:99px;transition:width .4s}
  .xp-strip .xp-txt{font-size:.75rem;color:#a99ac8;white-space:nowrap;font-variant-numeric:tabular-nums}

  /* --- flavor / tip --- */
  .tip-box{background:rgba(139,92,246,.07);border:1px solid rgba(139,92,246,.18);border-radius:14px;padding:13px 15px;font-size:.82rem;color:#c9b8e8;margin-top:16px;line-height:1.5}
  .tip-box b{color:#d4b8ff}

  /* --- toast --- */
  #toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:rgba(20,8,35,.95);border:1px solid rgba(255,79,154,.35);border-radius:99px;padding:9px 20px;font-size:.82rem;font-weight:700;z-index:99;pointer-events:none;opacity:0;transition:opacity .2s;white-space:nowrap;backdrop-filter:blur(10px);box-shadow:0 8px 32px rgba(0,0,0,.4)}
  #toast.show{opacity:1}

  /* --- footer --- */
  .footer{text-align:center;color:#5a4a70;font-size:.72rem;margin-top:36px;padding-bottom:12px}
  .footer a{color:#8a7aa8}

  @media(max-width:520px){
    .ach-grid{grid-template-columns:repeat(2,1fr)}
    .stats-line{gap:10px;font-size:.78rem}
  }
</style>
</head>
<body>

<div class="topbar">
  <a href="./index.html" class="back">← Dashboard</a>
  <div class="title">WHOOP Quest <span>📋</span></div>
  <div class="right">
    <span id="xpPill" class="pill">LVL 1 · 0 XP</span>
  </div>
</div>

<div class="wrap">

  <!-- TODAY HERO -->
  <div class="today-hero" id="todayHero">
    <div class="date-row">
      <span class="date-label" id="dateLabel">Loading…</span>
      <span class="recovery-badge rb-yellow" id="recoveryBadge">—</span>
    </div>
    <div class="stats-line" id="statsLine"></div>
    <div class="mood-line" id="moodLine"></div>
  </div>

  <!-- QUEST BOARD -->
  <div class="section-label">📋 Today's Quests</div>
  <div class="quest-list" id="questList"></div>

  <!-- BONUS / WEEKLY -->
  <div class="section-label">⭐ Bonus Quests</div>
  <div class="quest-list" id="bonusList"></div>

  <!-- ACHIEVEMENTS -->
  <div class="section-label">🏆 Achievements</div>
  <div class="ach-grid" id="achGrid"></div>

  <!-- XP / LEVEL -->
  <div class="xp-strip" id="xpStrip" style="display:none">
    <div class="lvl-big" id="lvlBig">1</div>
    <div style="flex:1">
      <div style="font-size:.72rem;color:#a99ac8;margin-bottom:3px"><span id="rankName">Sprout</span></div>
      <div class="xp-bar-out"><div class="xp-bar-in" id="xpBarIn" style="width:0%"></div></div>
    </div>
    <div class="xp-txt" id="xpTxt">0 / 500</div>
  </div>

  <!-- TIP -->
  <div class="tip-box" id="tipBox"></div>

  <div class="footer">
    WHOOP Quest · built for Angela 💖 · <a href="https://github.com/DaCameraGirl/whoop-quest">github.com/DaCameraGirl/whoop-quest</a><br>
    <span style="font-size:.68rem;opacity:.7">Your body is the dungeon seed.</span>
  </div>
</div>

<div id="toast"></div>

<script>
/* ============================================================
   WHOOP QUEST — DAILY QUEST BOARD
   Real WHOOP stats → real missions
   Built for Angela / @DaCameraGirl · July 2026
   ============================================================ */

let WHOOP = null;
(async () => {
  try {
    const r = await fetch('./data/whoop.json', {cache:'no-cache'});
    if (r.ok) WHOOP = await r.json();
  } catch(e){}
  if (!WHOOP) {
    // fallback
    WHOOP = {
      recovery:[{date:'2026-07-16',score:46,rhr:70,hrv:23.7}],
      sleep:[{date:'2026-07-16',hours:7.7,performance:68,disturbances:3}],
      workouts:[]
    };
  }
  boot();
})();

function boot() {

// --- Parse WHOOP data ---
const recs = WHOOP.recovery || [];
const sleeps = WHOOP.sleep || [];
const workouts = WHOOP.workouts || [];

const latest = recs[recs.length-1] || {score:50,rhr:75,hrv:25,date:'today'};
const latestSleep = sleeps.find(s => s.date === latest.date) || sleeps[sleeps.length-1] || {hours:6,performance:60,disturbances:4};

const RECOVERY = latest.score;
const RHR = latest.rhr;
const HRV = latest.hrv;
const SLEEP_H = latestSleep.hours;
const SLEEP_PERF = latestSleep.performance || 60;
const DISTURB = latestSleep.disturbances || 0;
const DATE = latest.date;

// derived stats
const recoveryTier = RECOVERY >= 67 ? 'green' : RECOVERY >= 34 ? 'yellow' : 'red';
const tierName = {green:'Green Zone',yellow:'Yellow Zone',red:'Rest Day'}[recoveryTier];
const tierEmoji = {green:'💚',yellow:'💛',red:'❤️‍🩹'}[recoveryTier];

// streaks / history
function getStreak(metric, threshold, cmp = (a,b)=>a>=b) {
  let s = 0;
  for (let i = recs.length - 1; i >= 0; i--) {
    const v = metric === 'recovery' ? recs[i].score : 0;
    if (cmp(v, threshold)) s++; else break;
  }
  return s;
}
const greenStreak = getStreak('recovery', 67);
const totalGreen = recs.filter(r => r.score >= 67).length;

// sleep consistency (last 7 nights)
const recentSleeps = sleeps.slice(-7);
const avgSleep = recentSleeps.reduce((a,s)=>a+s.hours,0) / Math.max(1,recentSleeps.length);
const sleepConsistent = recentSleeps.length >= 3 && Math.max(...recentSleeps.map(s=>s.hours)) - Math.min(...recentSleeps.map(s=>s.hours)) < 2.5;

// workouts today / week
const todayWorkouts = workouts.filter(w => w.date === DATE);
const weekWorkouts = workouts.filter(w => {
  const d = new Date(w.date); const ld = new Date(DATE);
  return (ld - d) / 86400000 < 7;
});
const todayStrain = todayWorkouts.reduce((a,w)=>a+(w.strain||0),0);
const weekStrain = weekWorkouts.reduce((a,w)=>a+(w.strain||0),0);

// --- RENDER TODAY HERO ---
document.getElementById('dateLabel').textContent = new Date(DATE+'T12:00:00').toLocaleDateString('en-US',{weekday:'long',month:'short',day:'numeric'});
const rbClass = recoveryTier==='green'?'rb-green':recoveryTier==='yellow'?'rb-yellow':'rb-red';
document.getElementById('recoveryBadge').className = 'recovery-badge '+rbClass;
document.getElementById('recoveryBadge').textContent = tierEmoji + ' ' + RECOVERY + '% · ' + tierName;

document.getElementById('statsLine').innerHTML = `
  <span>💤 <b>${SLEEP_H.toFixed(1)}h</b> sleep</span>
  <span>❤️ <b>${RHR}</b> RHR</span>
  <span>⚡ <b>${HRV.toFixed(1)}</b> HRV</span>
  <span>🔥 <b>${todayStrain.toFixed(1)}</b> strain today</span>
  <span>📊 <b>${SLEEP_PERF}%</b> sleep perf</span>
`;

const moodText = {
  green: `<b>Green zone!</b> Your body is ready. Take on a real challenge today — you've earned it 💚`,
  yellow: `<b>Yellow zone.</b> Steady energy. Hit your targets, don't force it. Consistency beats heroics 💛`,
  red: `<b>Rest day detected.</b> That's not failure — that's data. Recover hard, come back stronger ❤️‍🩹`
}[recoveryTier];
document.getElementById('moodLine').innerHTML = moodText;

// --- QUEST GENERATOR ---
// Quest = {id, icon, title, desc, tags[], xp, tier, check()}
const todayKey = 'wq_' + DATE;
const saved = JSON.parse(localStorage.getItem(todayKey) || '{}');

function q(id, icon, title, desc, tags, xp, tier='any') {
  return {id,icon,title,desc,tags,xp,tier,done:!!saved[id]};
}

const allQuests = [];

// --- Recovery-tier quests ---
if (recoveryTier === 'green') {
  allQuests.push(
    q('g_strain', '💪', 'Warrior Mode', `Your recovery is ${RECOVERY}% — push it. Log a real workout and beat your 7-day avg strain.`, ['green','strain','workout'], 120, 'green'),
    q('g_hrv', '⚡', 'HRV Hero', `Beat your 30-day HRV average. Current: ${HRV.toFixed(1)} ms — can you top it tomorrow?`, ['green','hrv'], 80, 'green'),
    q('g_steps', '🚶‍♀️', 'Stair Master', `3+ walks today. Parking lot laps count! You did 6 yesterday — beat that.`, ['green','activity'], 100, 'green'),
    q('g_consistency', '🎯', 'Keep the Streak', `You're on a ${greenStreak}-day green streak. Don't break it — sleep 7h+ tonight.`, ['green','sleep','streak'], 90, 'green'),
  );
} else if (recoveryTier === 'yellow') {
  allQuests.push(
    q('y_balance', '⚖️', 'Balance Seeker', `Hit your strain coach target exactly — not over, not under. Precision day.`, ['yellow','strain'], 80, 'yellow'),
    q('y_sleep', '😌', 'Sleep Upgrade', `Last night: ${SLEEP_H.toFixed(1)}h @ ${SLEEP_PERF}% performance. Tonight target: 7.5h+, 75%+ perf.`, ['yellow','sleep'], 90, 'yellow'),
    q('y_walk', '🚶‍♀️', 'Gentle Movement', `2 walks, easy pace. Keep HR in the green. No heroics — just move.`, ['yellow','activity'], 60, 'yellow'),
    q('y_nap', '💤', 'Power Nap', `20-min nap between 1–3pm. WHOOP-verified recovery boost.`, ['yellow','recovery'], 50, 'yellow'),
  );
} else { // red
  allQuests.push(
    q('r_rest', '🛋️', 'Rest Guardian', `Recovery is ${RECOVERY}%. Today's mission: REST. No intense workouts. Walk only.`, ['red','recovery'], 70, 'red'),
    q('r_sleep', '🌙', 'Sleep Rescue', `You got ${SLEEP_H.toFixed(1)}h last night. Tonight: lights out by 10:30pm, target 8h+.`, ['red','sleep'], 100, 'red'),
    q('r_hydrate', '💧', 'Hydrate & Recover', `Drink 8+ glasses of water. No caffeine after 2pm. Magnesium before bed if you have it.`, ['red','recovery'], 50, 'red'),
    q('r_breathe', '🧘', 'Breathe', `5 min breathing exercise before bed. Box breathing: 4-4-4-4. HRV will thank you.`, ['red','hrv','recovery'], 40, 'red'),
  );
}

// --- Universal daily quests (always available) ---
allQuests.push(
  q('u_water', '💧', 'Hydrate', `8 glasses of water today. Simple. Effective.`, ['daily'], 30),
  q('u_sleep7', '😴', 'Sleep 7+', `Hit 7+ hours of sleep tonight. Your 30-day avg is ${avgSleep.toFixed(1)}h — let's push it up.`, ['sleep','daily'], 60),
  q('u_walk', '🚶‍♀️', 'Daily Walk', `At least 1 walk today. Parking lot, stairs, whatever. Just move.`, ['activity','daily'], 40),
  q('u_nocaffeine', '☕🚫', 'Caffeine Curfew', `No caffeine after 2pm. Your sleep performance will thank you.`, ['sleep','daily'], 40),
);

// --- Bonus / weekly quests ---
const bonusQuests = [
  q('b_streak3', '🔥', '3-Day Green Streak', `Hit green recovery 3 days in a row. Current streak: ${greenStreak}.`, ['streak','weekly'], 200),
  q('b_consistency', '📐', 'Sleep Consistency Crown', `Keep sleep/wake times within 30 min for 5 nights straight.`, ['sleep','weekly'], 150),
  q('b_comeback', '👑', 'Comeback Queen', `Bounce from red recovery → green in 24 hours. The ultimate flex.`, ['recovery','weekly'], 250),
  q('b_walks', '🏃‍♀️', 'Walk Warrior Week', `Log 15+ walks in 7 days. You're already at ${weekWorkouts.length} this week.`, ['activity','weekly'], 180),
  q('b_hrvpr', '⚡', 'HRV PR', `Beat your all-time HRV high. Current best in dataset: ${Math.max(...recs.map(r=>r.hrv)).toFixed(1)} ms.`, ['hrv','weekly'], 200),
  q('b_noscreen', '📵', 'Screen-Free Wind-Down', `No screens 1 hour before bed, 3 nights in a row.`, ['sleep','weekly'], 120),
];

// --- ACHIEVEMENTS ---
// ach = {id, emoji, name, desc, check(), progress?}
const achievements = [
  {id:'first_green', emoji:'💚', name:'First Green', desc:'Hit your first green recovery', check:()=> totalGreen >= 1},
  {id:'streak3', emoji:'🔥', name:'Triple Threat', desc:'3-day green streak', check:()=> greenStreak >= 3 || totalGreen >= 3, progress:()=>`${Math.min(greenStreak,3)}/3`},
  {id:'streak7', emoji:'🌟', name:'Week Warrior', desc:'7-day green streak', check:()=> greenStreak >= 7, progress:()=>`${Math.min(greenStreak,7)}/7`},
  {id:'sleep_queen', emoji:'😴', name:'Sleep Queen', desc:'Average 7h+ sleep over 7 nights', check:()=> avgSleep >= 7, progress:()=>`${avgSleep.toFixed(1)}/7.0h`},
  {id:'hrv_hero', emoji:'⚡', name:'HRV Hero', desc:'HRV above 40 ms', check:()=> HRV >= 40},
  {id:'comeback', emoji:'👑', name:'Comeback Queen', desc:'Red → Green in 24h', check:()=>{ for(let i=1;i<recs.length;i++){ if(recs[i-1].score < 34 && recs[i].score >= 67) return true } return false; }},
  {id:'walker', emoji:'🚶‍♀️', name:'Stair Master', desc:'Log 3+ walks in one day', check:()=>{ const byDate={}; workouts.forEach(w=>{byDate[w.date]=(byDate[w.date]||0)+1}); return Object.values(byDate).some(c=>c>=3); }},
  {id:'consistency', emoji:'📐', name:'Consistency Crown', desc:'Sleep times within 30 min, 5 nights', check:()=> sleepConsistent},
  {id:'ten_green', emoji:'💎', name:'Green Machine', desc:'10 green recovery days total', check:()=> totalGreen >= 10, progress:()=>`${totalGreen}/10`},
  {id:'sleep_90', emoji:'🌙', name:'Sleep Perfectionist', desc:'Hit 90%+ sleep performance', check:()=> sleeps.some(s=>s.performance >= 90)},
  {id:'strain_beast', emoji:'💪', name:'Strain Beast', desc:'Log 15+ strain in a single day', check:()=>{ const byDate={}; workouts.forEach(w=>{byDate[w.date]=(byDate[w.date]||0)+(w.strain||0)}); return Object.values(byDate).some(s=>s>=15); }},
  {id:'rest_wisdom', emoji:'🧘', name:'Rest Wisely', desc:'Take a full rest day on red recovery (0 strain logged)', check:()=> recs.some((r,i)=> r.score < 34 && !(workouts.some(w=>w.date===r.date)) ), desc2:'(logged no workout on a red day) – wisdom!'},
];

const unlockedAch = achievements.filter(a => { try { return a.check() } catch(e){return false} });
const lockedAch = achievements.filter(a => { try { return !a.check() } catch(e){return true} });

// --- RENDER QUESTS ---
function renderQuests(list, el, emptyMsg) {
  if (list.length === 0) {
    el.innerHTML = `<div style="color:#7a6a98;font-size:.82rem;padding:8px 4px">${emptyMsg}</div>`;
    return;
  }
  el.innerHTML = list.map(q => `
    <div class="quest ${q.done ? 'done' : ''}" data-qid="${q.id}">
      <div class="q-check" data-qid="${q.id}">${q.done ? '✓' : ''}</div>
      <div class="q-icon">${q.icon}</div>
      <div class="q-body">
        <div class="q-title">${q.title}</div>
        <div class="q-desc">${q.desc}</div>
        <div class="q-meta">
          <span class="q-tag xp">+${q.xp} XP</span>
          ${q.tags.map(t => `<span class="q-tag">${t}</span>`).join('')}
        </div>
      </div>
    </div>
  `).join('');
  el.querySelectorAll('.quest, .q-check').forEach(elem => {
    elem.addEventListener('click', e => {
      e.stopPropagation();
      const qid = elem.dataset.qid;
      const quest = [...allQuests, ...bonusQuests].find(q => q.id === qid);
      if (!quest) return;
      const s = JSON.parse(localStorage.getItem(todayKey) || '{}');
      const wasDone = !!s[qid];
      s[qid] = !wasDone;
      localStorage.setItem(todayKey, JSON.stringify(s));
      quest.done = s[qid];
      // Re-render
      renderQuests(allQuests, document.getElementById('questList'), 'No quests today — weird!');
      renderQuests(bonusQuests, document.getElementById('bonusList'), '');
      updateXP();
      showToast((wasDone ? '↩️ Unmarked: ' : '✅ Completed: ') + quest.title, 1600);
    });
  });
}

renderQuests(allQuests, document.getElementById('questList'), 'No quests today — weird!');
renderQuests(bonusQuests, document.getElementById('bonusList'), '');

// --- RENDER ACHIEVEMENTS ---
const achGrid = document.getElementById('achGrid');
achGrid.innerHTML = [...unlockedAch, ...lockedAch].map(a => {
  const unlocked = unlockedAch.includes(a);
  const prog = !unlocked && a.progress ? a.progress() : '';
  return `<div class="ach ${unlocked ? 'unlocked' : 'locked'}">
    ${!unlocked ? '<span class="lock-badge">🔒</span>' : ''}
    <span class="ach-emoji">${a.emoji}</span>
    <div class="ach-name">${a.name}</div>
    <div class="ach-desc">${a.desc}${a.desc2||''}</div>
    ${prog ? `<div class="ach-prog"><b>${prog}</b></div>` : ''}
  </div>`;
}).join('');

// --- XP / LEVEL ---
function getTotalXP() {
  // Base XP from WHOOP history
  let baseXP = recs.reduce((a,r)=>a+r.score,0);
  workouts.forEach(w => { baseXP += (w.strain||0) * 10; });
  // Quest XP from all saved days
  let questXP = 0;
  for (let i = 0; i < localStorage.length; i++) {
    const key = localStorage.key(i);
    if (key && key.startsWith('wq_')) {
      try {
        const s = JSON.parse(localStorage.getItem(key));
        Object.keys(s).forEach(qid => {
          if (s[qid]) {
            const q = [...allQuests, ...bonusQuests].find(x => x.id === qid);
            if (q) questXP += q.xp;
          }
        });
      } catch(e){}
    }
  }
  return Math.round(baseXP + questXP);
}

function updateXP() {
  const totalXP = getTotalXP();
  const level = Math.floor(totalXP / 500) + 1;
  const xpInLevel = totalXP % 500;
  const ranks = ['Sprout','Bloom','Vigor','Radiant','Zen Master','Legend','WHOOP Queen','Cosmic Chee'];
  const rankName = ranks[Math.min(level-1, ranks.length-1)];

  document.getElementById('xpPill').textContent = `LVL ${level} · ${totalXP} XP`;
  document.getElementById('lvlBig').textContent = level;
  document.getElementById('rankName').textContent = rankName;
  document.getElementById('xpBarIn').style.width = (xpInLevel/500*100) + '%';
  document.getElementById('xpTxt').textContent = `${xpInLevel} / 500`;
  document.getElementById('xpStrip').style.display = 'flex';
}
updateXP();

// --- TIP ---
const tips = {
  green: [
    `Green day fuel: protein + complex carbs within 30 min of waking. Your body is primed to use it 💚`,
    `Your HRV is <b>${HRV.toFixed(1)} ms</b> — that's ${HRV >= 35 ? 'solid' : 'room to grow'}. Hit that workout while your nervous system is ready.`,
    `Strain target for green days: 14–18. You're at ${todayStrain.toFixed(1)} so far — ${todayStrain < 10 ? 'go get it!' : 'nice work!'}`,
  ],
  yellow: [
    `Yellow zone = maintenance mode. Hit your numbers, don't chase PRs. Consistency > intensity 💛`,
    `Sleep performance was ${SLEEP_PERF}% last night. Aim for 75%+ tonight — cool room, no screens 1h before bed.`,
    `Your RHR is ${RHR} bpm. Hydrate well today, it'll help bring that down overnight.`,
  ],
  red: [
    `Red recovery is NOT failure — it's information. Your body is asking for rest. Listen to it ❤️‍🩹`,
    `Skip the intense workout today. Walk, stretch, breathe. Comeback Queen energy tomorrow 👑`,
    `Magnesium + no screens + cool dark room = best shot at flipping red → green overnight.`,
  ],
};
const tipArr = tips[recoveryTier];
document.getElementById('tipBox').innerHTML = '💡 <b>Coach Chee says:</b> ' + tipArr[Math.floor(Math.random() * tipArr.length)];

// --- Toast ---
function showToast(txt, ms=1400) {
  const t = document.getElementById('toast');
  t.textContent = txt; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), ms);
}

// --- Done ---
console.log('[WHOOP Quest Board] Angela ·', DATE, '·', RECOVERY + '%', '·', unlockedAch.length + '/' + achievements.length, 'achievements');

} // end boot()
