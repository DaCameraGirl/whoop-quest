<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>WHOOP Quest: Three Futures 💖</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700;800&display=swap');
  *{box-sizing:border-box;margin:0;padding:0;user-select:none;-webkit-user-select:none;touch-action:none}
  body{font-family:'Space Grotesk',system-ui,sans-serif;background:#0d0a1a;color:#fff;overflow:hidden;height:100vh;height:100dvh;display:flex;flex-direction:column}
  #hud{flex-shrink:0;background:rgba(15,10,30,.92);border-bottom:2px solid rgba(255,79,154,.3);padding:8px 14px;display:flex;align-items:center;gap:14px;flex-wrap:wrap;font-size:.8rem;z-index:100;backdrop-filter:blur(8px)}
  #hud .hstat{display:flex;align-items:center;gap:5px;font-weight:600}
  #hud .hbar{width:70px;height:7px;background:rgba(255,255,255,.12);border-radius:99px;overflow:hidden}
  #hud .hbar > i{display:block;height:100%;border-radius:99px;transition:width .3s}
  .hp-fill{background:linear-gradient(90deg,#34d399,#10b981)}
  .en-fill{background:linear-gradient(90deg,#60a5fa,#3b82f6)}
  .xp-fill{background:linear-gradient(90deg,#f472b6,#ec4899)}
  #hud b{font-variant-numeric:tabular-nums}
  #hud .sep{opacity:.3}
  #gameWrap{flex:1;position:relative;overflow:hidden}
  #gameCanvas{display:block;width:100%;height:100%;image-rendering:pixelated;image-rendering:crisp-edges;cursor:crosshair}
  #dpad{position:absolute;left:18px;bottom:18px;display:none;z-index:50;pointer-events:none}
  #dpad button{pointer-events:auto;width:54px;height:54px;border-radius:50%;border:2px solid rgba(255,255,255,.25);background:rgba(20,10,40,.55);color:#fff;font-size:1.3rem;font-weight:700;position:absolute;backdrop-filter:blur(6px);-webkit-tap-highlight-color:transparent}
  #dpad button:active{background:rgba(255,79,154,.35);transform:scale(.93)}
  #btnUp{left:54px;top:0} #btnDown{left:54px;top:108px} #btnLeft{left:0;top:54px} #btnRight{left:108px;top:54px}
  #btnFire{position:absolute;right:20px;bottom:20px;width:72px;height:72px;border-radius:50%;border:2px solid rgba(255,79,154,.5);background:rgba(255,79,154,.18);color:#ff6fb8;font-size:.7rem;font-weight:800;display:none;z-index:50;backdrop-filter:blur(6px);-webkit-tap-highlight-color:transparent}
  #btnFire:active{background:rgba(255,79,154,.4);transform:scale(.93)}
  #overlay{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(8,4,20,.86);z-index:200;backdrop-filter:blur(10px)}
  #overlayCard{background:linear-gradient(160deg,#1a1238 0%,#241845 100%);border:2px solid rgba(255,79,154,.35);border-radius:24px;padding:32px 28px;max-width:440px;width:calc(100% - 32px);text-align:center;box-shadow:0 24px 80px rgba(0,0,0,.6),0 0 60px rgba(255,79,154,.12)}
  #overlayCard h1{font-size:1.55rem;font-weight:800;margin-bottom:6px}
  #overlayCard h1 span{color:#ff4f9a}
  #overlayCard .sub{color:#a99ac8;font-size:.82rem;margin-bottom:18px}
  .future-pick{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin:16px 0}
  .future-btn{background:rgba(255,255,255,.06);border:2px solid rgba(255,255,255,.14);border-radius:14px;padding:14px 8px;cursor:pointer;color:#fff;font-family:inherit;transition:all .15s}
  .future-btn:hover,.future-btn.sel{border-color:#ff4f9a;background:rgba(255,79,154,.14);transform:translateY(-2px)}
  .future-btn .f-emoji{font-size:1.9rem;display:block;margin-bottom:4px}
  .future-btn .f-name{font-weight:700;font-size:.78rem}
  .future-btn .f-desc{font-size:.68rem;color:#9a8ab8;margin-top:2px}
  .btn-pink{background:linear-gradient(135deg,#ff4f9a,#ff6fb8);color:#fff;border:none;border-radius:12px;padding:13px 28px;font-weight:800;font-size:.92rem;cursor:pointer;font-family:inherit;box-shadow:0 6px 24px rgba(255,79,154,.35);transition:transform .1s}
  .btn-pink:hover{transform:translateY(-1px) scale(1.02)}
  .btn-pink:active{transform:scale(.97)}
  .btn-ghost{background:transparent;color:#a99ac8;border:1px solid rgba(255,255,255,.2);border-radius:10px;padding:9px 20px;font-weight:600;font-size:.8rem;cursor:pointer;font-family:inherit;margin-top:10px}
  .stat-row{display:flex;justify-content:space-between;padding:6px 0;font-size:.82rem;border-bottom:1px solid rgba(255,255,255,.07)}
  .stat-row:last-child{border:none}
  .stat-row span:first-child{color:#a99ac8}
  .stat-row b{color:#fff;font-variant-numeric:tabular-nums}
  .g{color:#34d399} .y{color:#fbbf24} .r{color:#ff5a7a}
  #toast{position:absolute;top:60px;left:50%;transform:translateX(-50%);background:rgba(15,5,30,.92);border:1px solid rgba(255,79,154,.35);border-radius:99px;padding:7px 18px;font-size:.78rem;font-weight:600;z-index:90;pointer-events:none;opacity:0;transition:opacity .2s;white-space:nowrap;backdrop-filter:blur(8px)}
  #toast.show{opacity:1}
  #pauseBtn{margin-left:auto;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.18);color:#c9b8e8;border-radius:8px;padding:4px 12px;font-size:.72rem;font-weight:700;cursor:pointer;font-family:inherit}
  #pauseBtn:hover{background:rgba(255,255,255,.14)}
  @media(max-width:680px){ #dpad,#btnFire{display:block} #gameCanvas{cursor:default} #hud{font-size:.72rem;gap:8px;padding:6px 10px} #hud .hbar{width:52px} }
  .scanline{position:absolute;inset:0;pointer-events:none;background:repeating-linear-gradient(transparent,transparent 2px,rgba(0,0,0,.035) 2px,rgba(0,0,0,.035) 4px);z-index:5}
</style>
</head>
<body>

<div id="hud">
  <span class="hstat">🐆 <b id="hudName">Chee</b></span>
  <span class="sep">·</span>
  <span class="hstat">❤️ <div class="hbar"><i class="hp-fill" id="hpFill" style="width:100%"></i></div> <b id="hpNum">100</b></span>
  <span class="hstat">⚡ <div class="hbar"><i class="en-fill" id="enFill" style="width:100%"></i></div> <b id="enNum">100</b></span>
  <span class="hstat">✨ LVL <b id="lvlNum">1</b></span>
  <span class="hstat"><div class="hbar" style="width:54px"><i class="xp-fill" id="xpFill" style="width:0%"></i></div></span>
  <span class="hstat">💀 <b id="killNum">0</b></span>
  <button id="pauseBtn">⏸</button>
</div>

<div id="gameWrap">
  <div class="scanline"></div>
  <canvas id="gameCanvas"></canvas>
  <div id="dpad">
    <button id="btnUp">▲</button>
    <button id="btnLeft">◄</button>
    <button id="btnRight">►</button>
    <button id="btnDown">▼</button>
  </div>
  <button id="btnFire">FIRE<br>💥</button>
  <div id="toast"></div>

  <div id="overlay">
    <div id="overlayCard"></div>
  </div>
</div>

<script>
/* ============================================================
   WHOOP QUEST: THREE FUTURES
   Your body is the dungeon seed.
   Built for Angela / @DaCameraGirl · July 2026
   ============================================================ */

let WHOOP = null;
(async () => {
  try {
    const r = await fetch('./data/whoop.json', {cache:'no-cache'});
    if (r.ok) WHOOP = await r.json();
  } catch(e){}
  if (!WHOOP) {
    // Fallback — Angela's Jul 15 stats
    WHOOP = {recovery:[{date:'2026-07-15',score:16,rhr:71,hrv:34.8}],
      sleep:[{date:'2026-07-15',hours:2.2,performance:10,disturbances:4}],
      workouts:[]};
  }
  boot();
})();

function boot() {
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
let W=800, H=520;
function resize() {
  const wrap = document.getElementById('gameWrap');
  W = canvas.width = wrap.clientWidth;
  H = canvas.height = wrap.clientHeight;
}
resize(); window.addEventListener('resize', resize);

// --- WHOOP → Game Stats ---
const recs = WHOOP.recovery || [];
const sleeps = WHOOP.sleep || [];
const latest = recs[recs.length-1] || {score:50,rhr:75,hrv:25};
const latestSleep = sleeps.find(s => s.date === latest.date) || sleeps[sleeps.length-1] || {hours:6,performance:60,disturbances:5};

const RECOVERY = latest.score;
const RHR = latest.rhr;
const HRV = latest.hrv;
const SLEEP_H = latestSleep.hours;
const SLEEP_PERF = latestSleep.performance;
const DISTURB = latestSleep.disturbances || 5;
const STRAIN_TODAY = (WHOOP.workouts||[]).filter(w=>w.date===latest.date).reduce((a,w)=>a+w.strain,0);

// --- The Three Futures — EMOJI INFESTATION MODE 😤 ---
const FUTURES = {
  work: {
    id:'work', name:'Work Future', emoji:'📊',
    desc:'High strain. Sharp, overclocked agents.',
    color1:'#ff3b5c', color2:'#ff7a45',
    bg:'#1a0a14',
    enemyEmoji:[
      // Office hell
      '📎','💼','📈','⚙️','📊','💻','📋','✉️','📞','⏰','💸','📉','🔔',
      // Deadlines & stress
      '📌','📍','🗂️','📁','🖨️','⌛','⏳','🔥','💥','⚡','🚨','❗','‼️',
      // Corporate dread
      '📝','📄','🧾','💳','🏢','🖥️','⌨️','🖱️','📠','🗑️','🔗','🔒','📛',
      // The grind
      '☕','🤖','🔧','⛓️','💰','📉','📈','🕐','🕑','🕒','🕓','🕔',
    ],
    enemyName:'Overclock Agent',
    fog: 0.15,
    spawnRate: 1.4,
    enemySpeed: 1.35,
    enemyHP: 1,
    flavor: 'The inbox never sleeps. Neither do they.'
  },
  body: {
    id:'body', name:'Body Future', emoji:'🌫️',
    desc:'Low recovery. Fog beasts. Heavy air.',
    color1:'#6b4bc9', color2:'#3d2568',
    bg:'#0f0a1e',
    enemyEmoji:[
      // Sleepy fog nightmare
      '👻','🌫️','💤','🫧','😴','🥱','🛏️','☁️','🌙',
      // Exhaustion
      '😵','😵‍💫','🥴','💫','✨','🌟','💭','🌀','🕸️',
      // Night terrors
      '🦇','🕷️','🦉','🌚','🌘','🌑','❄️','💨','🌪️',
      // Bed monsters
      '🧸','🪦','⚰️','🦠','🧪','💊','🩹','🩻','🫠',
      // Dream fog
      '🔮','🌌','☁️','💜','🟣','🔵','🌊','🎭','🎪',
    ],
    enemyName:'Fog Beast',
    fog: 0.5,
    spawnRate: 0.9,
    enemySpeed: 0.72,
    enemyHP: 2,
    flavor: 'Everything moves through molasses. Including you.'
  },
  connection: {
    id:'connection', name:'Connection Future', emoji:'👁️',
    desc:'Stress / low HRV. Ghost echoes trail you.',
    color1:'#00d9c0', color2:'#006b5c',
    bg:'#051a18',
    enemyEmoji:[
      // Emotional ghosts
      '👁️','💬','📱','🫥','❤️‍🩹','📵','💔','😶',
      // Missed connections
      '📞','☎️','📟','💌','✉️','📨','📩','📧','📮',
      // Ghost feelings
      '👤','👥','🫂','💭','😮‍💨','😔','🥺','😢','😭',
      // Social anxiety
      '👀','🙈','🙉','🙊','🤐','😶‍🌫️','🫣','😳','🥲',
      // Unread messages
      '🔕','🔇','⏰','⌛','⏳','💬','💭','🗯️','💤',
      // The void
      '🕳️','🌑','🖤','💀','☠️','👻','🫥','🌫️','🔮',
    ],
    enemyName:'Echo',
    fog: 0.28,
    spawnRate: 1.15,
    enemySpeed: 1.0,
    enemyHP: 1,
    flavor: 'Ghostly echoes trail you like overdue emotional invoices.'
  }
};

// Auto-pick future based on WHOOP stats
function pickFuture() {
  const strainScore = STRAIN_TODAY * 6; // 0-~120
  const bodyScore = (100 - RECOVERY) * 0.9; // 0-90
  const connScore = Math.max(0, 40 - HRV) * 2.2 + DISTURB * 3; // HRV low + disturbed sleep
  if (strainScore >= bodyScore && strainScore >= connScore) return 'work';
  if (bodyScore >= connScore) return 'body';
  return 'connection';
}
let futureKey = pickFuture();
let FUTURE = FUTURES[futureKey];

// --- Game State ---
let running = false, paused = false;
let player, bullets = [], enemies = [], particles = [], pickups = [];
let kills = 0, level = 1, xp = 0, xpNeed = 500;
let wave = 1, waveTimer = 0, enemiesSpawned = 0, gameTime = 0;
let keys = {};
let touchMove = {x:0, y:0};
let mouseX = 0, mouseY = 0;
let shakeT = 0;

const clamp = (v,a,b)=>Math.max(a,Math.min(b,v));
const dist = (a,b,x,y)=>Math.hypot(a-x,b-y);
const rnd = (a,b)=>a + Math.random()*(b-a);

function showToast(txt, ms=1400) {
  const t = document.getElementById('toast');
  t.textContent = txt; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), ms);
}

// --- Player ---
function resetPlayer() {
  player = {
    x: W/2, y: H/2, r: 16,
    hp: 100, hpMax: 100,
    energy: Math.round(SLEEP_H / 9 * 100),
    energyMax: 100,
    speed: 2.8 + (HRV - 20) / 60 * 1.1, // HRV = clarity = move speed
    fireRate: 0,
    fireCooldown: Math.max(7, 18 - Math.floor(SLEEP_PERF / 8)), // better sleep = faster fire
    dmg: 1,
    color: '#ff4f9a',
  };
  updateHud();
}
function updateHud() {
  document.getElementById('hpNum').textContent = player.hp;
  document.getElementById('hpFill').style.width = (player.hp/player.hpMax*100)+'%';
  document.getElementById('enNum').textContent = Math.round(player.energy);
  document.getElementById('enFill').style.width = (player.energy/player.energyMax*100)+'%';
  document.getElementById('lvlNum').textContent = level;
  document.getElementById('xpFill').style.width = (xp/xpNeed*100)+'%';
  document.getElementById('killNum').textContent = kills;
}

// --- Enemies ---
function spawnEnemy() {
  const side = Math.floor(Math.random()*4);
  let x, y;
  if (side === 0) { x = rnd(0, W); y = -20; }
  else if (side === 1) { x = W+20; y = rnd(0, H); }
  else if (side === 2) { x = rnd(0, W); y = H+20; }
  else { x = -20; y = rnd(0, H); }
  const emoji = FUTURE.enemyEmoji[Math.floor(Math.random()*FUTURE.enemyEmoji.length)];
  enemies.push({
    x, y, r: rnd(13, 19),
    hp: FUTURE.enemyHP,
    speed: FUTURE.enemySpeed * rnd(0.82, 1.28),
    emoji,
    wobble: Math.random() * Math.PI * 2,
    hitFlash: 0,
  });
}

// --- Bullets / Particles ---
function fireBullet(tx, ty) {
  if (player.fireRate > 0 || player.energy < 4) return;
  player.fireRate = player.fireCooldown;
  player.energy = Math.max(0, player.energy - 3.2);
  const ang = Math.atan2(ty - player.y, tx - player.x);
  const spd = 7.5;
  bullets.push({
    x: player.x, y: player.y,
    vx: Math.cos(ang) * spd,
    vy: Math.sin(ang) * spd,
    r: 4, life: 66,
  });
  for (let i=0;i<5;i++) particles.push({
    x:player.x, y:player.y,
    vx: Math.cos(ang + rnd(-0.5,0.5)) * rnd(1,3),
    vy: Math.sin(ang + rnd(-0.5,0.5)) * rnd(1,3),
    life: rnd(10,18), maxLife:18,
    color: '#ff8ac4', sz: rnd(2,4)
  });
}

// --- Pickups ---
function dropPickup(x, y) {
  if (Math.random() < 0.22) {
    pickups.push({x, y, r:10, type: Math.random() < 0.65 ? 'hp' : 'energy',
      bob: Math.random()*Math.PI*2, life: 420});
  }
}

// --- Input ---
canvas.addEventListener('mousemove', e => {
  const rect = canvas.getBoundingClientRect();
  mouseX = (e.clientX - rect.left) * (W / rect.width);
  mouseY = (e.clientY - rect.top) * (H / rect.height);
});
canvas.addEventListener('mousedown', e => {
  if (!running) return;
  const rect = canvas.getBoundingClientRect();
  const tx = (e.clientX - rect.left) * (W / rect.width);
  const ty = (e.clientY - rect.top) * (H / rect.height);
  fireBullet(tx, ty);
});
window.addEventListener('keydown', e => { keys[e.key.toLowerCase()] = true;
  if (e.key === ' ' || e.key === 'Spacebar') { e.preventDefault(); if(running) fireBullet(mouseX, mouseY); }
  if (e.key === 'Escape' || e.key.toLowerCase() === 'p') togglePause();
});
window.addEventListener('keyup', e => { keys[e.key.toLowerCase()] = false; });

// Touch dpad
function bindTouch(id, dx, dy) {
  const b = document.getElementById(id);
  if (!b) return;
  const start = e => { e.preventDefault(); touchMove.x = dx; touchMove.y = dy; };
  const end = e => { e.preventDefault(); touchMove.x = 0; touchMove.y = 0; };
  b.addEventListener('touchstart', start, {passive:false});
  b.addEventListener('touchend', end, {passive:false});
  b.addEventListener('touchcancel', end, {passive:false});
  b.addEventListener('mousedown', start);
  b.addEventListener('mouseup', end);
  b.addEventListener('mouseleave', end);
}
bindTouch('btnUp', 0, -1); bindTouch('btnDown', 0, 1);
bindTouch('btnLeft', -1, 0); bindTouch('btnRight', 1, 0);
const fireBtn = document.getElementById('btnFire');
if (fireBtn) {
  const fireStart = e => { e.preventDefault(); keys[' '] = true; };
  const fireEnd = e => { e.preventDefault(); keys[' '] = false; };
  fireBtn.addEventListener('touchstart', fireStart, {passive:false});
  fireBtn.addEventListener('touchend', fireEnd, {passive:false});
  fireBtn.addEventListener('touchcancel', fireEnd, {passive:false});
  fireBtn.addEventListener('mousedown', fireStart);
  fireBtn.addEventListener('mouseup', fireEnd);
  fireBtn.addEventListener('mouseleave', fireEnd);
}

// --- Game Loop ---
function update() {
  if (!running || paused) return;
  gameTime++;

  // Player move
  let mx = 0, my = 0;
  if (keys['w'] || keys['arrowup']) my -= 1;
  if (keys['s'] || keys['arrowdown']) my += 1;
  if (keys['a'] || keys['arrowleft']) mx -= 1;
  if (keys['d'] || keys['arrowright']) mx += 1;
  mx += touchMove.x; my += touchMove.y;
  const ml = Math.hypot(mx, my);
  if (ml > 0) {
    player.x = clamp(player.x + mx / ml * player.speed, player.r, W - player.r);
    player.y = clamp(player.y + my / ml * player.speed, player.r, H - player.r);
  }
  // Energy regen (sleep = sustained energy)
  player.energy = Math.min(player.energyMax, player.energy + SLEEP_H * 0.012);
  if (player.fireRate > 0) player.fireRate--;
  if (keys[' '] && running) fireBullet(mouseX, mouseY);

  // Bullets
  bullets = bullets.filter(b => {
    b.x += b.vx; b.y += b.vy; b.life--;
    return b.life > 0 && b.x > -20 && b.x < W+20 && b.y > -20 && b.y < H+20;
  });

  // Enemies
  const enemiesPerWave = 5 + wave * 2;
  waveTimer++;
  if (enemiesSpawned < enemiesPerWave && waveTimer > Math.max(14, 44 - wave*2) / FUTURE.spawnRate) {
    spawnEnemy(); enemiesSpawned++; waveTimer = 0;
  }
  enemies.forEach(en => {
    const ang = Math.atan2(player.y - en.y, player.x - en.x);
    en.x += Math.cos(ang) * en.speed;
    en.y += Math.sin(ang) * en.speed;
    en.wobble += 0.13;
    if (en.hitFlash > 0) en.hitFlash--;
    // Hit player?
    if (dist(en.x, en.y, player.x, player.y) < en.r + player.r - 3) {
      player.hp = Math.max(0, player.hp - 9);
      updateHud();
      shakeT = 9;
      for (let i=0;i<10;i++) particles.push({
        x:player.x, y:player.y,
        vx:rnd(-3,3), vy:rnd(-3,3), life:rnd(12,22), maxLife:22,
        color:'#ff5a7a', sz:rnd(2,5)
      });
      en.hp = 0;
      if (player.hp <= 0) { gameOver(); return; }
    }
  });

  // Bullet vs enemy
  bullets.forEach(b => {
    enemies.forEach(en => {
      if (en.hp <= 0) return;
      if (dist(b.x, b.y, en.x, en.y) < en.r + b.r) {
        en.hp -= player.dmg;
        en.hitFlash = 5;
        b.life = 0;
        for (let i=0;i<7;i++) particles.push({
          x:en.x, y:en.y,
          vx:rnd(-2.5,2.5), vy:rnd(-2.5,2.5),
          life:rnd(10,18), maxLife:18,
          color:FUTURE.color1, sz:rnd(2,4)
        });
        if (en.hp <= 0) {
          kills++;
          const gained = 18 + Math.floor(wave * 1.8);
          xp += gained;
          if (xp >= xpNeed) {
            xp -= xpNeed; level++; xpNeed = 500 + level * 90;
            player.hp = Math.min(player.hpMax, player.hp + 22);
            player.dmg += 0.18;
            showToast(`⬆ LEVEL ${level} — ${FUTURE.enemyName}s fear you`);
          }
          updateHud();
          dropPickup(en.x, en.y);
        }
      }
    });
  });
  enemies = enemies.filter(en => en.hp > 0);

  // Pickups
  pickups.forEach(p => { p.bob += 0.11; p.life--;
    if (dist(p.x, p.y, player.x, player.y) < p.r + player.r) {
      if (p.type === 'hp') { player.hp = Math.min(player.hpMax, player.hp + 24); showToast('❤️ +24 HP'); }
      else { player.energy = Math.min(player.energyMax, player.energy + 36); showToast('⚡ +36 Energy'); }
      updateHud(); p.life = 0;
    }
  });
  pickups = pickups.filter(p => p.life > 0);

  // Particles
  particles = particles.filter(p => { p.x += p.vx; p.y += p.vy; p.vx *= 0.96; p.vy *= 0.96; p.life--; return p.life > 0; });

  // Wave clear?
  if (enemiesSpawned >= enemiesPerWave && enemies.length === 0) {
    wave++; enemiesSpawned = 0; waveTimer = -55;
    player.hp = Math.min(player.hpMax, player.hp + 13);
    player.energy = Math.min(player.energyMax, player.energy + 22);
    updateHud();
    showToast(`✨ Wave ${wave} — ${FUTURE.name} intensifies`, 1600);
  }
  if (shakeT > 0) shakeT--;
}

// --- Render ---
function draw() {
  ctx.save();
  if (shakeT > 0) ctx.translate(rnd(-2,2), rnd(-2,2));

  // BG gradient
  const bgGrad = ctx.createLinearGradient(0, 0, W, H);
  bgGrad.addColorStop(0, FUTURE.bg);
  bgGrad.addColorStop(1, '#0b0618');
  ctx.fillStyle = bgGrad;
  ctx.fillRect(0, 0, W, H);

  // Grid / fog
  ctx.strokeStyle = FUTURE.color1 + '18';
  ctx.lineWidth = 1;
  const gs = 44;
  for (let x = (gameTime * 0.15) % gs; x < W; x += gs) { ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke(); }
  for (let y = (gameTime * 0.11) % gs; y < H; y += gs) { ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke(); }
  // Fog overlay
  if (FUTURE.fog > 0) {
    ctx.fillStyle = `rgba(10,5,25,${FUTURE.fog * 0.38})`;
    ctx.fillRect(0, 0, W, H);
  }

  // Pickups
  pickups.forEach(p => {
    const bob = Math.sin(p.bob) * 3;
    ctx.font = '20px "Space Grotesk", system-ui, sans-serif';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.shadowColor = p.type === 'hp' ? '#ff5a7a' : '#60a5fa';
    ctx.shadowBlur = 12;
    ctx.fillText(p.type === 'hp' ? '❤️' : '⚡', p.x, p.y + bob);
    ctx.shadowBlur = 0;
  });

  // Bullets
  bullets.forEach(b => {
    ctx.fillStyle = '#ff8ac4';
    ctx.shadowColor = '#ff4f9a'; ctx.shadowBlur = 8;
    ctx.beginPath(); ctx.arc(b.x, b.y, b.r, 0, Math.PI*2); ctx.fill();
    ctx.shadowBlur = 0;
  });

  // Enemies
  enemies.forEach(en => {
    const pulse = Math.sin(en.wobble) * 1.5;
    ctx.font = `${Math.round(en.r * 1.55 + pulse)}px "Apple Color Emoji","Segoe UI Emoji","Noto Color Emoji",system-ui,sans-serif`;
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    if (en.hitFlash > 0) { ctx.shadowColor = '#fff'; ctx.shadowBlur = 14; }
    else { ctx.shadowColor = FUTURE.color1; ctx.shadowBlur = 10; }
    ctx.fillText(en.emoji, en.x, en.y + 1);
    ctx.shadowBlur = 0;
    // HP pips for tanky enemies
    if (FUTURE.enemyHP > 1) {
      ctx.fillStyle = 'rgba(255,255,255,.55)';
      ctx.font = '700 9px "Space Grotesk", system-ui, sans-serif';
      ctx.fillText('♥'.repeat(en.hp), en.x, en.y - en.r - 6);
    }
  });

  // Player — Chee
  ctx.font = '34px "Apple Color Emoji","Segoe UI Emoji","Noto Color Emoji",system-ui,sans-serif';
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.shadowColor = '#ff4f9a'; ctx.shadowBlur = 16;
  const cheeEmoji = player.hp >= 67 ? '😸' : player.hp >= 34 ? '😌' : '😴';
  ctx.fillText(cheeEmoji, player.x, player.y);
  ctx.shadowBlur = 0;
  // HP ring
  ctx.strokeStyle = 'rgba(255,255,255,.22)';
  ctx.lineWidth = 2.5;
  ctx.beginPath(); ctx.arc(player.x, player.y, player.r + 5, 0, Math.PI*2); ctx.stroke();
  ctx.strokeStyle = '#34d399';
  ctx.beginPath();
  ctx.arc(player.x, player.y, player.r + 5, -Math.PI/2, -Math.PI/2 + Math.PI*2 * (player.hp/player.hpMax));
  ctx.stroke();

  // Particles
  particles.forEach(p => {
    const a = p.life / p.maxLife;
    ctx.globalAlpha = a;
    ctx.fillStyle = p.color;
    ctx.beginPath(); ctx.arc(p.x, p.y, p.sz * a, 0, Math.PI*2); ctx.fill();
    ctx.globalAlpha = 1;
  });

  // Wave / Future label
  ctx.fillStyle = 'rgba(255,255,255,.72)';
  ctx.font = '800 13px "Space Grotesk", system-ui, sans-serif';
  ctx.textAlign = 'left';
  ctx.fillText(`${FUTURE.emoji} ${FUTURE.name} — Wave ${wave}`, 14, 22);
  ctx.fillStyle = 'rgba(255,255,255,.44)';
  ctx.font = '600 10.5px "Space Grotesk", system-ui, sans-serif';
  ctx.fillText(`Rec ${RECOVERY}% · HRV ${HRV} · Sleep ${SLEEP_H}h · Strain ${STRAIN_TODAY}`, 14, 37);

  ctx.restore();
}

function loop() {
  update();
  draw();
  if (running) requestAnimationFrame(loop);
}

// --- UI Flow ---
const overlay = document.getElementById('overlay');
const overlayCard = document.getElementById('overlayCard');

function showFutureSelect() {
  const rClass = RECOVERY >= 67 ? 'g' : RECOVERY >= 34 ? 'y' : 'r';
  overlayCard.innerHTML = `
    <h1>WHOOP Quest<br><span>Three Futures</span> 💖</h1>
    <p class="sub">Your body is the dungeon seed. Angela — ${latest.date || 'today'}</p>
    <div style="background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:14px;padding:14px 16px;margin:14px 0;text-align:left;font-size:.8rem">
      <div class="stat-row"><span>Recovery</span><b class="${rClass}">${RECOVERY}%</b></div>
      <div class="stat-row"><span>HRV</span><b>${HRV} ms</b></div>
      <div class="stat-row"><span>RHR</span><b>${RHR} bpm</b></div>
      <div class="stat-row"><span>Sleep</span><b>${SLEEP_H}h / ${SLEEP_PERF}%</b></div>
      <div class="stat-row"><span>Disturbances</span><b>${DISTURB}</b></div>
      <div class="stat-row"><span>Strain</span><b>${STRAIN_TODAY.toFixed(1)}</b></div>
    </div>
    <p style="color:#a99ac8;font-size:.78rem;margin-bottom:8px">Your WHOOP stats chose your Future:</p>
    <div class="future-pick" id="futurePick"></div>
    <button class="btn-pink" id="startBtn">▶ Enter the ${FUTURE.name}</button>
    <br><button class="btn-ghost" onclick="location.href='./index.html'">← Back to Dashboard</button>
  `;
  const pickEl = document.getElementById('futurePick');
  Object.values(FUTURES).forEach(f => {
    const btn = document.createElement('button');
    btn.className = 'future-btn' + (f.id === futureKey ? ' sel' : '');
    btn.innerHTML = `<span class="f-emoji">${f.emoji}</span><span class="f-name">${f.name}</span><span class="f-desc">${f.desc}</span>`;
    btn.onclick = () => {
      futureKey = f.id; FUTURE = f;
      document.querySelectorAll('.future-btn').forEach(b => b.classList.remove('sel'));
      btn.classList.add('sel');
      document.getElementById('startBtn').textContent = `▶ Enter the ${f.name}`;
    };
    pickEl.appendChild(btn);
  });
  document.getElementById('startBtn').onclick = startGame;
  overlay.style.display = 'flex';
}

function startGame() {
  overlay.style.display = 'none';
  bullets = []; enemies = []; particles = []; pickups = [];
  kills = 0; level = 1; xp = 0; xpNeed = 500;
  wave = 1; enemiesSpawned = 0; waveTimer = 0; gameTime = 0;
  resetPlayer();
  running = true; paused = false;
  showToast(`${FUTURE.emoji} ${FUTURE.name} — ${FUTURE.flavor}`, 2400);
  loop();
}

function gameOver() {
  running = false;
  overlayCard.innerHTML = `
    <h1>Rest Day 💤</h1>
    <p class="sub">Chee got knocked out — but that's OK!</p>
    <div style="background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:14px;padding:16px;margin:16px 0;text-align:left;font-size:.82rem">
      <div class="stat-row"><span>Enemies defeated</span><b>${kills}</b></div>
      <div class="stat-row"><span>Waves survived</span><b>${wave}</b></div>
      <div class="stat-row"><span>Level reached</span><b>${level}</b></div>
      <div class="stat-row"><span>XP earned</span><b>${xp} / ${xpNeed}</b></div>
      <div class="stat-row"><span>Future</span><b>${FUTURE.emoji} ${FUTURE.name}</b></div>
    </div>
    <p style="color:#a99ac8;font-size:.78rem;margin-bottom:16px">
      Your WHOOP stats shaped this run:<br>
      Recovery ${RECOVERY}% · HRV ${HRV} ms · Sleep ${SLEEP_H}h<br>
      Come back tomorrow with fresh stats for a new run! 💖
    </p>
    <button class="btn-pink" id="againBtn">🔄 Play Again</button>
    <br><button class="btn-ghost" onclick="location.href='./stress.html'">📊 Stress Analysis</button>
  `;
  document.getElementById('againBtn').onclick = () => { showFutureSelect(); };
  overlay.style.display = 'flex';
}

function togglePause() {
  if (!running) return;
  paused = !paused;
  if (paused) {
    overlayCard.innerHTML = `<h1>⏸ Paused</h1>
      <p class="sub" style="margin-bottom:18px">Take a breath, Angela 💛</p>
      <button class="btn-pink" id="resumeBtn">▶ Resume</button>
      <br><button class="btn-ghost" id="quitBtn">Quit to Menu</button>`;
    document.getElementById('resumeBtn').onclick = togglePause;
    document.getElementById('quitBtn').onclick = () => { running = false; paused = false; showFutureSelect(); };
    overlay.style.display = 'flex';
  } else {
    overlay.style.display = 'none';
    loop();
  }
}
document.getElementById('pauseBtn').onclick = togglePause;

// --- Go ---
showFutureSelect();

} // end boot()
</script>
</body>
</html>
